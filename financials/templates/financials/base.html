{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NUMERIS — NGX Intelligence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07090f;
      --surface:   #0f1320;
      --surface2:  #161c2e;
      --border:    #1c2440;
      --border2:   #242d4a;
      --accent:    #00e5a0;
      --accent-dim:#00c488;
      --blue:      #3b82f6;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --text:      #e2e8f8;
      --muted:     #4a5580;
      --label:     #7a88b0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      height: 58px;
      background: rgba(7,9,15,0.9);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
    }
    .topbar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 18px;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-pulse {
      width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:0.3; transform:scale(0.7); }
    }
    .topbar-right {
      display: flex; align-items: center; gap: 20px;
    }
    .topbar-badge {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); border: 1px solid rgba(0,229,160,0.25);
      padding: 3px 10px; border-radius: 20px;
      background: rgba(0,229,160,0.05);
    }
    .topbar-nav a {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--label); text-decoration: none;
      padding: 4px 12px; border-radius: 5px;
      transition: color 0.2s, background 0.2s;
    }
    .topbar-nav a:hover { color: var(--text); background: var(--surface2); }

    /* ── PAGE WRAPPER ── */
    .page { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 40px 40px 80px; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted);
      border-left: 2px solid var(--accent);
      padding-left: 10px;
      margin-bottom: 14px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 26px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .card-meta {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 20px;
    }

    /* ── GRIDS ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

    @media(max-width:1024px){ .grid-4{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:860px){
      .grid-2,.grid-3,.grid-4 { grid-template-columns: 1fr; }
      .topbar { padding: 0 20px; }
      .page { padding: 24px 20px 60px; }
    }

    /* ── KPI CARD ── */
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      position: relative; overflow: hidden;
      transition: transform 0.18s, border-color 0.18s;
    }
    .kpi-card:hover { transform: translateY(-3px); border-color: var(--border2); }
    .kpi-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      opacity: 0; transition: opacity 0.18s;
    }
    .kpi-card:hover::after { opacity: 1; }
    .kpi-label {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .kpi-value {
      font-family: 'Syne', sans-serif;
      font-size: 21px; font-weight: 800; color: var(--text); line-height: 1;
    }
    .kpi-value.negative { color: var(--danger); }
    .kpi-value.positive { color: var(--accent); }
    .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .kpi-delta { font-size: 11px; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
    .kpi-delta.up { color: var(--accent); }
    .kpi-delta.down { color: var(--danger); }
    .kpi-delta.neutral { color: var(--warn); }

    /* ── SIGNAL BADGE ── */
    .signal {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 6px;
    }
    .signal-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    .signal.buy   { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
    .signal.hold  { background: rgba(245,158,11,0.1);  color: var(--warn);   border: 1px solid rgba(245,158,11,0.3); }
    .signal.watch { background: rgba(59,130,246,0.1);  color: var(--blue);   border: 1px solid rgba(59,130,246,0.3); }
    .signal.avoid { background: rgba(239,68,68,0.1);   color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

    /* ── FLAG LIST ── */
    .flag-list { display: flex; flex-direction: column; gap: 10px; }
    .flag-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border-radius: 10px; font-size: 12px;
    }
    .flag-item.green { background: rgba(0,229,160,0.05);  border-left: 3px solid var(--accent); }
    .flag-item.warn  { background: rgba(245,158,11,0.05); border-left: 3px solid var(--warn); }
    .flag-item.red   { background: rgba(239,68,68,0.05);  border-left: 3px solid var(--danger); }
    .flag-icon { font-size: 15px; margin-top: 1px; flex-shrink: 0; }
    .flag-body { color: var(--label); line-height: 1.55; }
    .flag-body strong { color: var(--text); display: block; margin-bottom: 2px; font-size: 12px; }

    /* ── DATA TABLE ── */
    .data-table-wrap { overflow-x: auto; }
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .data-table th {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); text-align: left;
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 9px 14px; border-bottom: 1px solid rgba(28,36,64,0.6);
      color: var(--label); vertical-align: top;
      max-width: 320px; word-break: break-word;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.018); color: var(--text); }
    .data-table td:first-child { color: var(--text); font-weight: 500; }

    /* ── FINANCIAL LINES ── */
    .fin-lines-list { display: flex; flex-direction: column; gap: 2px; max-height: 520px; overflow-y: auto; }
    .fin-line {
      font-size: 11.5px; color: var(--label); padding: 5px 10px;
      border-radius: 4px; font-family: 'DM Mono', monospace;
      transition: background 0.15s;
      border-left: 2px solid transparent;
    }
    .fin-line:hover { background: var(--surface2); color: var(--text); }
    .fin-line.hl {
      color: var(--text); font-weight: 500;
      border-left-color: var(--accent);
      background: rgba(0,229,160,0.04);
    }
    .fin-lines-list::-webkit-scrollbar { width: 4px; }
    .fin-lines-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── TABLE ACCORDION ── */
    .table-accordion { display: flex; flex-direction: column; gap: 8px; }
    .table-acc-item {
      border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .table-acc-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 18px; cursor: pointer;
      background: var(--surface2);
      transition: background 0.15s;
      user-select: none;
    }
    .table-acc-header:hover { background: var(--border); }
    .table-acc-title { font-size: 12px; color: var(--text); font-weight: 500; }
    .table-acc-meta { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
    .table-acc-chevron {
      font-size: 12px; color: var(--muted);
      transition: transform 0.2s;
    }
    .table-acc-item.open .table-acc-chevron { transform: rotate(180deg); }
    .table-acc-body { display: none; padding: 0; }
    .table-acc-item.open .table-acc-body { display: block; }

    /* ── RATIO ROW ── */
    .ratio-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .ratio-row:last-child { border-bottom: none; }
    .ratio-name { font-size: 12px; color: var(--label); flex: 1; }
    .ratio-val  { font-size: 13px; color: var(--text); font-weight: 600; white-space: nowrap; }
    .ratio-bar  { width: 70px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .ratio-fill { height: 100%; border-radius: 2px; background: var(--accent); }

    /* ── COMPANY HEADER ── */
    .company-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 20px;
      padding: 28px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 28px;
    }
    .ch-ticker {
      font-family: 'Syne', sans-serif;
      font-size: 42px; font-weight: 800;
      color: var(--accent); letter-spacing: 0.04em; line-height: 1;
    }
    .ch-name { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .ch-period { font-size: 11px; color: var(--label); margin-top: 3px; }
    .ch-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    .meta-chip {
      font-size: 11px; color: var(--label);
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 4px 12px; border-radius: 6px;
    }

    /* ── TABS ── */
    .tab-bar {
      display: flex; gap: 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .tab-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 10px 20px; border: none; background: none; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.18s, border-color 0.18s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CHART CANVAS ── */
    .chart-wrap { position: relative; height: 240px; }
    .chart-wrap-tall { position: relative; height: 300px; }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      font-size: 11px; color: var(--muted);
      margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
    }
    .breadcrumb a { color: var(--label); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { color: var(--muted); }

    /* ── FADE-UP ANIMATION ── */
    .fade-up {
      opacity: 0; transform: translateY(18px);
      animation: fadeUp 0.45s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .d1{animation-delay:.04s} .d2{animation-delay:.08s}
    .d3{animation-delay:.12s} .d4{animation-delay:.16s}
    .d5{animation-delay:.20s} .d6{animation-delay:.24s}

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 13px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="topbar">
  <a href="{% url 'index' %}" class="topbar-logo">
    <div class="logo-pulse"></div>
    NUMERIS
  </a>
  <div class="topbar-right">
    <div class="topbar-nav">
      <a href="{% url 'index' %}">Dashboard</a>
    </div>
    <span class="topbar-badge">● NGX Data</span>
  </div>
</nav>

<div class="page">
  {% block content %}{% endblock %}
</div>

<script>
  // Tab switching
  function switchTab(groupId, tabId) {
    document.querySelectorAll(`[data-tabgroup="${groupId}"]`).forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[data-tabpanel="${groupId}"]`).forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-tabgroup="${groupId}"][data-tab="${tabId}"]`).classList.add('active');
    document.querySelector(`[data-tabpanel="${groupId}"][data-panel="${tabId}"]`).classList.add('active');
  }

  // Accordion
  function toggleAcc(el) {
    const item = el.closest('.table-acc-item');
    item.classList.toggle('open');
  }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
