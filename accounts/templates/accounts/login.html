{% extends "financials/base.html" %}
{% block title %}Login — NUMERIS{% endblock %}
{% block content %}
<div style="max-width:420px; margin:80px auto;">
  <div class="card" style="padding:40px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--accent); letter-spacing:0.1em;">NUMERIS</div>
      <div style="font-size:12px; color:var(--muted); margin-top:4px; letter-spacing:0.1em; text-transform:uppercase;">NGX Investment Intelligence</div>
    </div>

    {% if messages %}
      {% for msg in messages %}
      <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--danger); margin-bottom:16px;">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:16px;">
        <label style="font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:6px;">Email</label>
        <input type="email" name="email" required autofocus
          style="width:100%; background:var(--surface2); border:1px solid var(--border2); color:var(--text);
                 border-radius:8px; padding:10px 14px; font-family:'DM Mono',monospace; font-size:13px; outline:none;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'">
      </div>
      <div style="margin-bottom:24px;">
        <label style="font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:6px;">Password</label>
        <input type="password" name="password" required
          style="width:100%; background:var(--surface2); border:1px solid var(--border2); color:var(--text);
                 border-radius:8px; padding:10px 14px; font-family:'DM Mono',monospace; font-size:13px; outline:none;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'">
      </div>
      <button type="submit"
        style="width:100%; background:var(--accent); color:var(--bg); border:none; border-radius:8px;
               padding:12px; font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
               letter-spacing:0.1em; text-transform:uppercase; cursor:pointer;">
        Sign In →
      </button>
    </form>
  </div>
</div>
{% endblock %}
